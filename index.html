    {name:'PAPEL HASHI CLIENTE 25',unid:'UN'},{name:'SAL SACHE',unid:'UN'},{name:'VELA DE ANIVERSARIO',unid:'UN'},{name:'BERCO DE SHOYU',unid:'UN'}
  ]},
  { cat: 'EMBALAGENS - PLASTICO', items: [
    {name:'SACOLA PLASTICA REFORCADA',unid:'UN'},{name:'REDINHA 3KG PARA EMBALAGEM',unid:'UN'},{name:'POTE MOLHO DELIVERY 30 ML',unid:'UN'}
  ]}
];

let responsible = '', countDate = '', counts = {};

function startCount() {
  responsible = document.getElementById('responsible').value.trim();
  countDate = document.getElementById('countDate').value;
  if (!responsible || !countDate) { alert('Por favor, preencha o nome do responsável e a data!'); return; }
  const d = new Date(countDate + 'T00:00:00');
  document.getElementById('infoResp').textContent = responsible;
  document.getElementById('infoDate').textContent = d.toLocaleDateString('pt-BR');
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');
  buildSections();
  updateProgress();
}

function buildSections() {
  const cont = document.getElementById('sections');
  cont.innerHTML = '';
  const section = document.createElement('div');
  section.className = 'content';
  cont.appendChild(section);

  categorias.forEach((cat, ci) => {
    const block = document.createElement('div');
    block.className = 'category-block';
    const hdr = document.createElement('div');
    hdr.className = 'category-header';
    hdr.innerHTML = `<span>${cat.cat}</span><div style="display:flex;gap:10px;align-items:center"><span class="count-badge" id="badge-${ci}">0/${cat.items.length}</span><span class="toggle">\u25b2</span></div>`;
    const body = document.createElement('div');
    body.id = `catbody-${ci}`;
    const table = document.createElement('table');
    table.className = 'items-table';
    table.innerHTML = `<thead><tr><th>PRODUTO</th><th>UNID</th><th>QTD</th></tr></thead>`;
    const tbody = document.createElement('tbody');
    cat.items.forEach((item, ii) => {
      const key = `${ci}-${ii}`;
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${item.name}</td><td class="unid">${item.unid||''}</td><td><input class="qty-input" type="number" id="inp-${key}" step="0.001" min="0" placeholder="0" oninput="onInput('${key}',${ci})" /></td>`;
      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    body.appendChild(table);
    block.appendChild(hdr);
    block.appendChild(body);
    hdr.addEventListener('click', () => {
      const b = document.getElementById(`catbody-${ci}`);
      const tog = hdr.querySelector('.toggle');
      if (b.style.display === 'none') { b.style.display = ''; tog.textContent = '\u25b2'; }
      else { b.style.display = 'none'; tog.textContent = '\u25bc'; }
    });
    section.appendChild(block);
  });
}

function onInput(key, ci) {
  const inp = document.getElementById(`inp-${key}`);
  const val = inp.value;
  counts[key] = val;
  inp.classList.toggle('filled', val !== '' && parseFloat(val) > 0);
  const cat = categorias[ci];
  let filled = 0;
  cat.items.forEach((_, ii) => { const v = counts[`${ci}-${ii}`]; if (v && parseFloat(v) > 0) filled++; });
  const badge = document.getElementById(`badge-${ci}`);
  if (badge) badge.textContent = `${filled}/${cat.items.length}`;
  updateProgress();
}

function updateProgress() {
  let total = 0, filled = 0;
  categorias.forEach((cat, ci) => {
    cat.items.forEach((_, ii) => {
      total++;
      const v = counts[`${ci}-${ii}`];
      if (v && parseFloat(v) > 0) filled++;
    });
  });
  const pct = total ? Math.round(filled/total*100) : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('infoProgress').textContent = `${filled}/${total} itens preenchidos (${pct}%)`;
}

function buildMirrorText() {
  const d = new Date(countDate + 'T00:00:00');
  let txt = `ESPELHO DE CONTAGEM SEMANAL DE ESTOQUE\n================================\nSetor: ${SETOR_NOME}\nResponsavel: ${responsible}\nData: ${d.toLocaleDateString('pt-BR')}\n================================\n\n`;
  categorias.forEach((cat, ci) => {
    let catHasItems = false;
    let catTxt = `[${cat.cat}]\n`;
    cat.items.forEach((item, ii) => {
      const v = counts[`${ci}-${ii}`];
      const hasV = v && parseFloat(v) > 0;
      if (hasV) {
        catHasItems = true;
        catTxt += `  ${item.name} | ${item.unid||''} | ${v}\n`;
      }
    });
    if (catHasItems) txt += catTxt + '\n';
  });
  txt += `================================\nFim da contagem`;
  return txt;
}

function closeMirror() { document.getElementById('mirrorModal').classList.add('hidden'); }

function sendWhatsApp() {
  const msg = buildMirrorText();
  const encoded = encodeURIComponent(msg);
  const url = `https://api.whatsapp.com/send?phone=${PHONE}&text=${encoded}`;
  try { navigator.clipboard.writeText(msg); } catch(e) {
    try { const ta = document.createElement('textarea'); ta.value = msg; ta.style.position='fixed'; ta.style.opacity='0'; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); } catch(e2) {}
  }
  const old = document.getElementById('waOverlay'); if (old) old.remove();
  const overlay = document.createElement('div');
  overlay.id = 'waOverlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:10000;display:flex;align-items:center;justify-content:center;padding:20px;';
  overlay.innerHTML = `<div style="background:white;border-radius:20px;padding:36px 32px;max-width:480px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.4);"><div style="font-size:56px;margin-bottom:12px;">📲</div><h2 style="font-size:20px;color:#7f1d1d;margin-bottom:8px;">Mensagem copiada!</h2><p style="color:#718096;font-size:14px;margin-bottom:24px;">Clique no botão verde para abrir o WhatsApp.<br>A mensagem já está copiada — só confirmar o envio.</p><a href="${url}" target="_blank" rel="noopener noreferrer" style="display:block;background:#25D366;color:white;text-decoration:none;padding:18px 24px;border-radius:12px;font-size:18px;font-weight:700;margin-bottom:12px;" onclick="document.getElementById('waOverlay').remove()">✅ ABRIR WHATSAPP AGORA</a><button onclick="document.getElementById('waOverlay').remove()" style="background:none;border:none;color:#a0aec0;font-size:13px;cursor:pointer;padding:8px;margin-top:4px;">Fechar</button></div>`;
  document.body.appendChild(overlay);
}

function downloadExcel() {
  const wb = XLSX.utils.book_new();
  const rows = [['CONTAGEM SEMANAL DE ESTOQUE \u2014 ' + SETOR_NOME],['Responsavel:', responsible, 'Data:', new Date(countDate+'T00:00:00').toLocaleDateString('pt-BR')],[]];
  rows.push(['CATEGORIA','PRODUTO','UNIDADE','QTD']);
  categorias.forEach((cat, ci) => {
    cat.items.forEach((item, ii) => {
      const v = counts[`${ci}-${ii}`] || '';
      const qty = v !== '' ? parseFloat(v) : '';
      rows.push([cat.cat, item.name, item.unid||'', qty]);
    });
  });
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:35},{wch:45},{wch:10},{wch:12}];
  XLSX.utils.book_append_sheet(wb, ws, 'ESTOQUE SUSHI');
  XLSX.writeFile(wb, `Contagem_Semanal_Sushi_${countDate.replace(/-/g,'')}.xlsx`);
}

function clearAll() {
  if (!confirm('Deseja limpar TODAS as quantidades preenchidas?')) return;
  counts = {};
  document.querySelectorAll('.qty-input').forEach(i => { i.value = ''; i.classList.remove('filled'); });
  document.querySelectorAll('.count-badge').forEach(b => { const p = b.textContent.split('/'); b.textContent = `0/${p[1]}`; });
  updateProgress();
}

function buildPayloadRows() {
  const rows = [];
  categorias.forEach((cat, ci) => {
    cat.items.forEach((item, ii) => {
      const v = counts[`${ci}-${ii}`] || '';
      const hasV = v !== '' && parseFloat(v) > 0;
      if (!hasV) return;
      rows.push({
        secao: SETOR_NOME,
        categoria: cat.cat,
        cod: '',
        produto: item.name,
        unidade: item.unid || '',
        quantidade: parseFloat(v)
      });
    });
  });
  return rows;
}

function pad2(n){ return String(n).padStart(2,'0'); }

function buildShortMsg() {
  const agora = new Date();
  const dataStr = pad2(agora.getDate()) + '/' + pad2(agora.getMonth()+1) + '/' + agora.getFullYear();
  const horaStr = pad2(agora.getHours()) + ':' + pad2(agora.getMinutes());
  return `CONTAGEM FEITA - VERIFIQUE O LINK: ${SITE_LINK}`;
}

async function enviarContagem() {
  const rows = buildPayloadRows();
  if (rows.length === 0) {
    alert('Nenhum item preenchido para enviar.');
    return;
  }
  const payload = {
    app: 'estoque',
    responsavel: responsible,
    data: countDate,
    enviadoEm: new Date().toISOString(),
    tipo: 'semanal',
    items: rows
  };

  const btns = document.querySelectorAll('.sticky-footer .btn');
  btns.forEach(b => b.disabled = true);

  try {
    await fetch(SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    mostrarConfirmacaoEnvio();
  } catch (e) {
    alert('Não foi possível enviar para a planilha. Verifique a conexão e tente novamente.');
  } finally {
    btns.forEach(b => b.disabled = false);
  }
}

function mostrarConfirmacaoEnvio() {
  const msg = buildShortMsg();
  const encoded = encodeURIComponent(msg);
  const url = `https://api.whatsapp.com/send?phone=${PHONE}&text=${encoded}`;
  const old = document.getElementById('waOverlay'); if (old) old.remove();
  const overlay = document.createElement('div');
  overlay.id = 'waOverlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:10000;display:flex;align-items:center;justify-content:center;padding:20px;';
  overlay.innerHTML = `<div style="background:white;border-radius:20px;padding:36px 32px;max-width:480px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.4);"><div style="font-size:56px;margin-bottom:12px;">\u2705</div><h2 style="font-size:20px;color:#7f1d1d;margin-bottom:8px;">Contagem enviada para a planilha!</h2><p style="color:#718096;font-size:14px;margin-bottom:20px;">Setor: <strong>${SETOR_NOME}</strong><br>Agora envie o aviso no WhatsApp:</p><div style="background:#fff5f5;border:1px solid #fecaca;border-radius:8px;padding:12px;font-size:13px;color:#2d3748;margin-bottom:20px;font-family:monospace;">${msg}</div><a href="${url}" target="_blank" rel="noopener noreferrer" style="display:block;background:#25D366;color:white;text-decoration:none;padding:16px 24px;border-radius:12px;font-size:17px;font-weight:700;margin-bottom:12px;" onclick="document.getElementById('waOverlay').remove()">\ud83d\udcf2 ENVIAR AVISO NO WHATSAPP</a><button onclick="document.getElementById('waOverlay').remove()" style="background:none;border:none;color:#a0aec0;font-size:13px;cursor:pointer;padding:8px;">Fechar</button></div>`;
  document.body.appendChild(overlay);
}

document.getElementById('countDate').valueAsDate = new Date();
</script>
